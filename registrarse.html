<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registro de sesion</title>
    <link rel="stylesheet" href="stilos.css/stilos.css">
</head>
<body>
    <header>
    <h1>Lenguajes de Programación</h1>
    <p>Explorando el futuro digital</p>
</header>

<nav>
    <a href="index.html">Inicio</a>
    <a href="tendencias.html">Tendencias</a>
    <a href="dispositivos.html">Dispositivos</a>
    <a href="programacion.html">Programación</a>
    <a href="contactos.html">contactos</a>
    <a href="registrarse.html">Registro</a>
</nav>

   <section>
    <article class="contenedor">
        <h1>Registro de inicio de sesión</h1>
    
        <hr>

        <form action="/submit" method="post">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" minlength="1" maxlength="20" required>
            <br><br>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>
            <br><br>

            <label for="numero">Número de teléfono:</label>
            <input type="tel" id="numero" name="numero" required>
            <br><br>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
            <br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>
            <br><br>

            <hr>
            <label>Sube tu foto de perfil:</label><br>
            <input type="file" name="archivo"> <br><br>

            <label>Elige tu color favorito:</label>
            <input type="color" name="color_favorito">
            <br><br>

            <label for="mes">Mes de ingreso:</label>
            <input type="month" id="mes" name="mes_ingreso">
            <br><br>

            <label>Nivel de satisfacción (1-10):</label>
            <input type="number" name="nivel" min="1" max="10">
            <br><br>

            <hr>
            <label>Género:</label>
            <input type="radio" name="sexo" value="m"> M
            <input type="radio" name="sexo" value="f"> F
            <br><br>

            <label for="fecha">Fecha de nacimiento:</label>
            <input type="date" id="fecha" name="fecha">
            <br><br>

            <label>Ciudad y Barrio:</label><br>
            <select name="ubicacion">
                <optgroup label="ciudades">
                    <option value="cali">Cali</option>
                    <option value="popayan">Popayán</option>
                    <option value="medellin">Medellín</option>
                    <option value="bogota">Bogotá</option>
                </optgroup>
            </select>
            <select name="" id="">
                <optgroup label="barrios">
                    <option value="rosal">El Rosal</option>
                    <option value="porvenir">Porvenir</option>
                    <option value="guayabal">el guayabal</option>
                    <option value="santa fe">Santa fe</option>
                </optgroup>
            </select>
            <br><br>

            <hr>
            <label for="terminos">acepta términos y condiciones</label>
            <input type="checkbox" id="terminos" name="terminos" required>
            <br><br>
            <input type="submit" value="Registrar">
        </form>
    </article>
</section>
</body>
</html>
